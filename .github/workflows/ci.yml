# Checks for branches and pull requests. Pushes to main are checked AND
# deployed by deploy.yml (lint + tests + build gate the Pages deployment in
# one dependency chain there).
name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
