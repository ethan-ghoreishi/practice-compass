# Checks only. Deployment is local (npm run deploy -> NAS Web Station); this
# repo is private and deliberately not published to Pages, because the data and
# attachments are personal.
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
